<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Дурак онлайн</title>
  <style>
    body { font-family: Arial; background: #1a1a2e; color: white; text-align: center; }
    .login { background: #16213e; padding: 30px; border-radius: 15px; display: inline-block; margin: 50px; }
    input, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; }
    button { background: #e94560; color: white; cursor: pointer; }
    .game { display: none; }
    .hand { display: flex; gap: 10px; justify-content: center; margin: 20px; }
    .card { width: 60px; height: 90px; background: white; color: black; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; border: 2px solid #ccc; cursor: pointer; }
    .card.trump { border-color: gold; }
    .table { display: flex; gap: 20px; justify-content: center; margin: 20px; }
    .table-pair { display: flex; gap: 10px; }
    .opponent { margin: 20px; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="login" id="loginScreen">
    <h2>Дурак онлайн</h2>
    <input id="playerName" placeholder="Твоё имя"><br>
    <button onclick="createGame()">Создать комнату</button><br>
    <input id="roomId" placeholder="ID комнаты">
    <button onclick="joinGame()">Присоединиться</button>
    <div id="errorMsg" style="color:red;"></div>
  </div>

  <div class="game" id="gameScreen">
    <h2>Дурак</h2>
    <div>Комната: <strong id="roomCode"></strong></div>
    <div class="opponent" id="opponentInfo"></div>
    <div class="table" id="tableArea"></div>
    <div class="hand" id="myHand"></div>
    <div style="margin:10px;">
      <button id="takeBtn" style="display:none;">Забрать</button>
    </div>
    <div id="statusMsg"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let game, myId;

    function createGame() {
      const name = document.getElementById('playerName').value.trim();
      if (!name) return;
      socket.emit('createRoom', name);
    }

    function joinGame() {
      const name = document.getElementById('playerName').value.trim();
      const room = document.getElementById('roomId').value.trim();
      if (!name || !room) return;
      socket.emit('joinRoom', room, name);
    }

    socket.on('error', msg => document.getElementById('errorMsg').textContent = msg);

    socket.on('gameState', (g) => {
      game = g;
      myId = socket.id;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('gameScreen').style.display = 'block';
      document.getElementById('roomCode').textContent = g.id;
      render();
    });

    function render() {
      const me = game.players.find(p => p.id === myId);
      const opp = game.players.find(p => p.id !== myId);
      document.getElementById('opponentInfo').textContent = opp ? `${opp.name} (карт: ${opp.hand.length})` : '';
      document.getElementById('statusMsg').textContent = game.status === 'waiting' ? 'Ожидание игрока...' : '';
      
      // Отображаем карты на руке
      const handDiv = document.getElementById('myHand');
      if (me) {
        handDiv.innerHTML = me.hand.map((c, i) => 
          `<div class="card ${c.trump ? 'trump' : ''}" onclick="selectCard(${i})">${c.value}${c.suit}</div>`
        ).join('');
      }
      
      // Стол
      const tableDiv = document.getElementById('tableArea');
      tableDiv.innerHTML = game.table.map(pair => 
        `<div class="table-pair">
          <div class="card">${pair.attacker.value}${pair.attacker.suit}</div>
          ${pair.defender ? `<div class="card">${pair.defender.value}${pair.defender.suit}</div>` : ''}
        </div>`
      ).join('');
      
      // Кнопка "Забрать" только для защищающегося
      const takeBtn = document.getElementById('takeBtn');
      if (game.defender === myId && game.table.some(p => !p.defender)) {
        takeBtn.style.display = 'inline-block';
        takeBtn.onclick = () => socket.emit('take', game.id);
      } else {
        takeBtn.style.display = 'none';
      }
    }

    function selectCard(index) {
      const me = game.players.find(p => p.id === myId);
      if (!me) return;
      if (game.turn === game.players.indexOf(me)) {
        // Атакующий
        socket.emit('attack', game.id, index);
      } else {
        // Защищающийся – нужно выбрать, какую карту бить
        // Для простоты: бьём первую неотбитую атаку
        const attackIndex = game.table.findIndex(p => !p.defender);
        if (attackIndex !== -1) {
          socket.emit('defend', game.id, attackIndex, index);
        }
      }
    }
  </script>
</body>
</html>
