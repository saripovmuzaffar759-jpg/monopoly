<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Дурак онлайн</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
    .login-screen { text-align: center; background: #16213e; padding: 30px; border-radius: 15px; margin-top: 50px; }
    .login-screen input { display: block; margin: 10px auto; padding: 10px; border-radius: 8px; border: none; width: 200px; background: #0f3460; color: white; }
    .login-screen button { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; font-weight: bold; }
    .game-container { display: none; width: 100%; max-width: 900px; margin: 0 auto; padding: 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .top-bar h2 { margin: 0; }
    .trump-badge { background: #fbbf24; color: #1a1a2e; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
    .opponent-area { background: #0f3460; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
    .opponent-area .avatar { width: 40px; height: 40px; border-radius: 50%; background: #16213e; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .table-area { min-height: 130px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; }
    .my-hand { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 15px 0; }
    .card { width: 80px; height: 120px; background: white; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; cursor: pointer; user-select: none; transition: transform 0.15s, box-shadow 0.15s; position: relative; border: 2px solid #ddd; color: #1a1a2e; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .card:hover { transform: translateY(-8px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    .card.red { color: #e74c3c; }
    .card.trump { border-color: gold; box-shadow: 0 0 12px gold; }
    .card .rank { position: absolute; top: 6px; left: 8px; font-size: 16px; line-height: 1; }
    .card .suit-big { font-size: 36px; }
    .card .suit-small { position: absolute; bottom: 6px; right: 8px; font-size: 16px; }
    .table-card { width: 80px; height: 120px; background: white; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; border: 2px solid #ddd; color: #1a1a2e; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .table-card.defender { border-color: #3498db; }
    .table-card.attacker { border-color: #e74c3c; }
    .actions { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.95rem; transition: background 0.2s; }
    .btn-primary { background: #e94560; color: white; }
    .btn-primary:hover { background: #c0392b; }
    .btn-secondary { background: #2c3e50; color: white; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .status-text { text-align: center; margin: 10px; font-size: 1rem; color: #fbbf24; }
    .error-text { color: #e74c3c; text-align: center; }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <h2>Дурак онлайн</h2>
    <input id="playerName" placeholder="Твоё имя"><br>
    <button onclick="createGame()">Создать комнату</button><br>
    <input id="roomId" placeholder="ID комнаты">
    <button onclick="joinGame()">Присоединиться</button>
    <div class="error-text" id="errorMsg"></div>
  </div>

  <div class="game-container" id="gameScreen">
    <div class="top-bar">
      <h2>Дурак</h2>
      <div>Комната: <strong id="roomCode"></strong></div>
      <div class="trump-badge" id="trumpDisplay"></div>
    </div>

    <div class="opponent-area" id="opponentInfo">
      <div class="avatar">👤</div>
      <div>
        <div id="opponentName"></div>
        <div style="font-size:0.8rem;">Карт в руке: <span id="opponentCardCount">0</span></div>
      </div>
    </div>

    <div class="table-area" id="tableArea"></div>

    <div class="my-hand" id="myHand"></div>

    <div class="actions">
      <button class="btn btn-primary" id="beatBtn" style="display:none;">Бито</button>
      <button class="btn btn-secondary" id="takeBtn" style="display:none;">Забрать</button>
    </div>
    <div class="status-text" id="statusMsg"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let game, myId;

    const suitsSymbols = { '♠': '♠', '♣': '♣', '♥': '♥', '♦': '♦' };
    const redSuits = ['♥', '♦'];

    function createGame() {
      const name = document.getElementById('playerName').value.trim();
      if (!name) return;
      socket.emit('createRoom', name);
    }

    function joinGame() {
      const name = document.getElementById('playerName').value.trim();
      const room = document.getElementById('roomId').value.trim();
      if (!name || !room) return;
      socket.emit('joinRoom', room, name);
    }

    socket.on('error', msg => document.getElementById('errorMsg').textContent = msg);

    socket.on('gameState', (g) => {
      game = g;
      myId = socket.id;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('gameScreen').style.display = 'block';
      document.getElementById('roomCode').textContent = g.id;
      document.getElementById('trumpDisplay').textContent = `Козырь: ${g.trump}`;
      if (g.status === 'gameOver') {
        document.getElementById('statusMsg').textContent = `Игра окончена! Победитель: ${g.winner || 'Ничья'}`;
      }
      render();
    });

    function cardHTML(card, clickable = false, index = null) {
      const isRed = redSuits.includes(card.suit);
      return `
        <div class="card ${isRed ? 'red' : ''} ${card.trump ? 'trump' : ''}" 
             ${clickable ? `onclick="handleCardClick(${index})"` : ''}>
          <div class="rank">${card.value}</div>
          <div class="suit-big">${suitsSymbols[card.suit]}</div>
          <div class="suit-small">${suitsSymbols[card.suit]}</div>
        </div>`;
    }

    function render() {
      const me = game.players.find(p => p.id === myId);
      const opp = game.players.find(p => p.id !== myId);
      document.getElementById('opponentName').textContent = opp ? opp.name : 'Ожидание';
      document.getElementById('opponentCardCount').textContent = opp ? opp.hand.length : 0;

      // Статус
      let status = '';
      if (game.status === 'waiting') status = 'Ожидание игрока...';
      else if (game.phase === 'attack' && game.turn === game.players.indexOf(me)) status = 'Ваш ход (атака)';
      else if (game.phase === 'defense' && game.players[1 - game.turn]?.id === myId) status = 'Защищайтесь';
      else if (game.phase === 'postBeat' && game.turn === game.players.indexOf(me)) status = 'Можно подкинуть или Бито';
      else status = 'Ожидание хода соперника';
      document.getElementById('statusMsg').textContent = status;

      // Мои карты
      const handDiv = document.getElementById('myHand');
      if (me) {
        handDiv.innerHTML = me.hand.map((c, i) => cardHTML(c, true, i)).join('');
      } else {
        handDiv.innerHTML = '';
      }

      // Стол
      const tableDiv = document.getElementById('tableArea');
      tableDiv.innerHTML = game.table.map(pair => `
        <div style="display:flex; gap:10px;">
          <div class="table-card attacker ${redSuits.includes(pair.attacker.suit) ? 'red' : ''}">
            ${pair.attacker.value} ${suitsSymbols[pair.attacker.suit]}
          </div>
          ${pair.defender ? `
          <div class="table-card defender ${redSuits.includes(pair.defender.suit) ? 'red' : ''}">
            ${pair.defender.value} ${suitsSymbols[pair.defender.suit]}
          </div>` : '<div class="table-card" style="background:#ddd;">?</div>'}
        </div>`).join('');

      // Кнопки
      const beatBtn = document.getElementById('beatBtn');
      const takeBtn = document.getElementById('takeBtn');
      beatBtn.style.display = 'none';
      takeBtn.style.display = 'none';
      if (game.phase === 'postBeat' && game.players[game.turn]?.id === myId) {
        beatBtn.style.display = 'inline-block';
        beatBtn.onclick = () => socket.emit('beat', game.id);
      }
      if (game.phase === 'defense' && game.players[1 - game.turn]?.id === myId) {
        takeBtn.style.display = 'inline-block';
        takeBtn.onclick = () => socket.emit('take', game.id);
      }
    }

    function handleCardClick(index) {
      const me = game.players.find(p => p.id === myId);
      if (!me || game.status !== 'playing') return;
      if (game.phase === 'attack' && game.players[game.turn]?.id === myId) {
        socket.emit('attack', game.id, index);
      } else if (game.phase === 'defense' && game.players[1 - game.turn]?.id === myId) {
        const attackIndex = game.table.findIndex(p => !p.defender);
        if (attackIndex !== -1) {
          socket.emit('defend', game.id, attackIndex, index);
        }
      } else if (game.phase === 'postBeat' && game.players[game.turn]?.id === myId) {
        socket.emit('attack', game.id, index);
      }
    }
  </script>
</body>
</html>
