<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Онлайн Монополия</title>
  <style>
    body { font-family: Arial; background: #1a1a2e; color: white; text-align: center; }
    .container { max-width: 1000px; margin: 0 auto; }
    .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 20px 0; }
    .cell { background: #16213e; border-radius: 8px; padding: 8px; font-size: 0.7rem; }
    .cell.owned { border: 2px solid gold; }
    .players { display: flex; gap: 10px; justify-content: center; margin: 10px; }
    .player { background: #0f3460; padding: 10px; border-radius: 10px; min-width: 120px; }
    .player.active { box-shadow: 0 0 15px gold; }
    .btn { padding: 10px 20px; background: #e94560; border: none; color: white; border-radius: 8px; cursor: pointer; margin: 5px; }
    .btn:disabled { background: #555; }
    input { padding: 10px; border-radius: 8px; border: none; margin: 5px; }
    .chat { max-height: 150px; overflow-y: auto; background: #0f3460; padding: 10px; border-radius: 8px; text-align: left; margin: 10px; }
    .chat p { margin: 3px 0; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div id="login">
      <h2>Онлайн Монополия</h2>
      <input id="playerName" placeholder="Твоё имя"><br>
      <button class="btn" onclick="createGame()">Создать комнату</button>
      <br>
      <input id="roomId" placeholder="ID комнаты">
      <button class="btn" onclick="joinGame()">Присоединиться</button>
    </div>
    <div id="game" style="display:none">
      <h2>Комната <span id="roomCode"></span></h2>
      <div class="players" id="playersList"></div>
      <div class="board" id="board"></div>
      <div>
        <button class="btn" id="rollBtn">Бросить кубик</button>
        <button class="btn" id="buyBtn" disabled>Купить</button>
        <span id="diceResult"></span>
      </div>
      <div class="chat" id="chatBox"></div>
      <input id="chatInput" placeholder="Сообщение..."><button class="btn" onclick="sendChat()">Отправить</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentRoom = null;
    let currentGame = null;

    function createGame() {
      const name = document.getElementById('playerName').value.trim();
      if (!name) return alert('Введи имя');
      socket.emit('createRoom', name);
    }

    function joinGame() {
      const name = document.getElementById('playerName').value.trim();
      const room = document.getElementById('roomId').value.trim();
      if (!name || !room) return alert('Введи имя и ID комнаты');
      socket.emit('joinRoom', room, name);
    }

    socket.on('gameState', (game) => {
      currentGame = game;
      currentRoom = game.id;
      document.getElementById('login').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      document.getElementById('roomCode').innerText = game.id;
      renderBoard(game);
      renderPlayers(game);
      renderChat(game);
      const player = game.players[game.currentTurn];
      document.getElementById('rollBtn').disabled = (player && player.id !== socket.id);
      const cell = player ? game.board[player.position] : null;
      document.getElementById('buyBtn').disabled = !(cell && cell.type === 'property' && cell.owner === null && player && player.id === socket.id && player.money >= cell.price);
      document.getElementById('diceResult').innerText = `🎲 ${game.dice[0]} + ${game.dice[1]}`;
    });

    function renderBoard(game) {
      const boardDiv = document.getElementById('board');
      boardDiv.innerHTML = game.board.map((cell, i) => {
        const playerHere = game.players.filter(p => p.position === i);
        return `<div class="cell ${cell.owner ? 'owned' : ''}" style="background:${cell.owner ? game.players.find(p=>p.id===cell.owner)?.color : ''}">
          ${cell.name}<br>${cell.price ? '💰'+cell.price : ''}<br>
          ${playerHere.map(p=>'🔴').join('')}
        </div>`;
      }).join('');
    }

    function renderPlayers(game) {
      document.getElementById('playersList').innerHTML = game.players.map((p, idx) => 
        `<div class="player ${idx === game.currentTurn ? 'active' : ''}" style="border:2px solid ${p.color}">
          ${p.name}<br>💰${p.money} ${p.inJail ? '🔒' : ''}
        </div>`
      ).join('');
    }

    function renderChat(game) {
      document.getElementById('chatBox').innerHTML = game.chat.map(m => `<p><b>${m.name}</b>: ${m.text}</p>`).join('');
    }

    document.getElementById('rollBtn').onclick = () => {
      if (currentRoom) socket.emit('rollDice', currentRoom);
    };

    document.getElementById('buyBtn').onclick = () => {
      if (currentRoom) socket.emit('buyProperty', currentRoom);
    };

    function sendChat() {
      const inp = document.getElementById('chatInput');
      if (inp.value.trim() && currentRoom) {
        socket.emit('chat', currentRoom, inp.value.trim());
        inp.value = '';
      }
    }

    socket.on('message', (msg) => {
      const div = document.createElement('div');
      div.textContent = msg;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    });
  </script>
</body>
</html>
